name: Monthly Trends Update

on:
  schedule:
    # 每月1号 UTC 02:00（北京时间 10:00）
    - cron: '0 2 1 * *'
  workflow_dispatch:
    # 支持手动触发（可在 GitHub Actions 页面点击 Run workflow）

permissions:
  contents: write

jobs:
  update-trends:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        run: python scripts/update_trends.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet docs/05-interview/04-trends.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/05-interview/04-trends.md
          git commit -m "chore: auto-update trends questions ($(date +'%Y-%m'))"
          git push
